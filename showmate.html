<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공연메이트 showmate 🎫</title>
  <style>
/* ===== 공연메이트 showmate =====
   콘셉트: 한국 대학생 프로젝트 느낌 — 파스텔 보라/핑크, 둥근 모서리, 귀엽고 깔끔하게
   (원본 스타일 + 동행 찾기 기능 추가분) */

:root {
  --violet: #7c3aed;
  --violet-light: #ede9fe;
  --pink: #f472b6;
  --pink-soft: #fdf2f8;
  --ink: #1e1b2e;
  --gray: #8b8798;
  --bg: #faf9ff;
  --card: #ffffff;
  --ok: #10b981;
  --radius: 20px;
  --shadow: 0 4px 16px rgba(124, 58, 237, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.5;
}

.hidden { display: none !important; }

/* ---------- 헤더 ---------- */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #f0edfa;
}
.header-inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--violet);
  text-decoration: none;
}
.logo-en {
  font-size: 0.8rem;
  color: var(--pink);
  font-weight: 700;
  vertical-align: middle;
}
.fav-toggle {
  border: 2px solid var(--violet-light);
  background: #fff;
  color: var(--violet);
  font-weight: 700;
  font-size: 0.85rem;
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.2s;
}
.fav-toggle:hover { background: var(--violet-light); }
.fav-toggle.active {
  background: var(--violet);
  border-color: var(--violet);
  color: #fff;
}

/* ---------- 레이아웃 ---------- */
.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 28px 20px 80px;
}
.section-title {
  font-size: 1.2rem;
  font-weight: 800;
  margin: 40px 0 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title .spacer { flex: 1; }
.section-sub {
  color: var(--gray);
  font-size: 0.9rem;
  margin-bottom: 16px;
}
.badge-new {
  background: var(--pink);
  color: #fff;
  font-size: 0.6rem;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 999px;
  vertical-align: middle;
}

/* ---------- 히어로 ---------- */
.hero {
  background: linear-gradient(120deg, #7c3aed, #c026d3, #f472b6);
  border-radius: 28px;
  color: #fff;
  padding: 40px 32px;
  box-shadow: var(--shadow);
}
.hero h1 { font-size: 1.6rem; font-weight: 800; }
.hero p { margin-top: 6px; opacity: 0.9; font-size: 0.95rem; }

/* ---------- 검색 + 필터 ---------- */
.search-area { margin-top: 24px; }
.search-box { position: relative; max-width: 520px; }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); }
#search-input {
  width: 100%;
  padding: 14px 16px 14px 46px;
  border: 2px solid #eee9fb;
  border-radius: 999px;
  font-size: 0.95rem;
  outline: none;
  background: #fff;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--violet); }

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.chip {
  border: none;
  background: #fff;
  box-shadow: inset 0 0 0 1.5px #e9e4f8;
  color: var(--gray);
  font-weight: 600;
  font-size: 0.85rem;
  padding: 8px 16px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.15s;
}
.chip:hover { background: var(--violet-light); color: var(--violet); }
.chip.active {
  background: var(--violet);
  color: #fff;
  box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
}

/* ---------- 공연 카드 ---------- */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 18px;
  margin-top: 16px;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-5px); box-shadow: 0 10px 24px rgba(124, 58, 237, 0.15); }
.poster { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 3.4rem; position: relative; }
/* 동행 활성 뱃지 (카드 위) */
.seek-badge {
  position: absolute; left: 10px; bottom: 10px;
  background: rgba(30,27,46,.72); color: #fff; backdrop-filter: blur(4px);
  font-size: .68rem; font-weight: 700; padding: 4px 9px; border-radius: 999px;
}
.card-body { padding: 14px 16px 16px; }
.card-tags { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.tag-genre { background: var(--violet-light); color: var(--violet); font-size: 0.7rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
.tag-region { color: var(--gray); font-size: 0.75rem; }
.card-title { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { color: var(--gray); font-size: 0.75rem; margin-top: 4px; }

.heart-btn {
  position: absolute; top: 10px; right: 10px; width: 36px; height: 36px;
  border: none; border-radius: 50%; background: rgba(255, 255, 255, 0.9);
  font-size: 1rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
  transition: transform 0.15s;
}
.heart-btn:hover { transform: scale(1.15); }
.heart-btn.liked { animation: pop 0.3s; }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

.empty { text-align: center; color: var(--gray); padding: 60px 0; }

/* ---------- 메이트 모집 (동행 게시판) ---------- */
.mate-head-actions { display: flex; align-items: center; gap: 10px; }
.btn-recruit {
  border: none; background: linear-gradient(120deg, var(--violet), var(--pink));
  color: #fff; font-weight: 800; font-size: 0.82rem; padding: 9px 15px;
  border-radius: 999px; cursor: pointer; box-shadow: 0 4px 12px rgba(124,58,237,.28);
}
.btn-recruit:active { transform: translateY(1px); }

.mate-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.mate-card {
  background: #fff; border-radius: var(--radius); padding: 18px;
  box-shadow: var(--shadow); border: 1.5px solid #f3f0fc; cursor: pointer;
  transition: transform .15s, box-shadow .2s;
}
.mate-card:hover { transform: translateY(-3px); box-shadow: 0 10px 22px rgba(124,58,237,.14); }
.mate-status {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
}
.badge { font-size: .68rem; font-weight: 800; padding: 3px 9px; border-radius: 999px; }
.badge.open { background: #e7f9f0; color: #0d9d68; }
.badge.closed { background: #f1eff5; color: #9b95a8; }
.mate-showline { font-size: .72rem; color: var(--gray); font-weight: 700; }
.mate-title { font-weight: 700; font-size: .95rem; line-height: 1.4; }
.mate-top { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
.mate-avatar {
  width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 1.3rem; background: var(--violet-light); flex-shrink: 0;
}
.mate-name { font-weight: 800; font-size: 0.9rem; }
.mate-info { color: var(--gray); font-size: 0.72rem; }
.mate-temp { font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-left: auto; }
.t-hot { background: #fff1f2; color: #e11d48; }
.t-warm { background: #fff7ed; color: #ea580c; }
.t-cool { background: #eff6ff; color: #2563eb; }
.mate-tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
.mate-tag { background: var(--pink-soft); color: var(--pink); font-size: 0.7rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
.mate-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 13px; padding-top: 11px; border-top: 1px solid #f0edfa;
}
.mate-people { font-size: .78rem; color: var(--gray); font-weight: 700; }
.mate-people b { color: var(--violet); }
.mate-cta { font-size: .8rem; color: var(--violet); font-weight: 800; }

/* ---------- 모달 (공통) ---------- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(30, 27, 46, 0.55);
  display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
}
.modal {
  background: #fff; border-radius: 24px; max-width: 480px; width: 100%;
  max-height: 88vh; overflow-y: auto; position: relative; animation: slide-up 0.25s ease-out;
}
@keyframes slide-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
.modal-close {
  position: absolute; top: 14px; right: 14px; width: 34px; height: 34px;
  border: none; border-radius: 50%; background: rgba(255, 255, 255, 0.9);
  cursor: pointer; font-size: 0.9rem; z-index: 2;
}
.modal-poster {
  height: 190px; display: flex; align-items: center; justify-content: center;
  font-size: 5rem; border-radius: 24px 24px 0 0;
}
.modal-content { padding: 20px 24px 26px; }
.modal-title { font-size: 1.3rem; font-weight: 800; margin: 8px 0 14px; }
.modal-row { display: flex; gap: 10px; font-size: 0.87rem; margin-bottom: 8px; }
.modal-row .label { width: 58px; flex-shrink: 0; font-weight: 700; color: var(--gray); }
.modal-desc { margin-top: 14px; background: var(--bg); border-radius: 14px; padding: 14px; font-size: 0.85rem; color: #4b4560; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-like {
  flex: 0 0 auto; border: 2px solid #f3e8ff; background: #fff; border-radius: 14px;
  padding: 12px 16px; font-weight: 700; font-size: 0.9rem; cursor: pointer;
}
.btn-like.liked { background: #fdf2f8; border-color: #fbcfe8; color: #db2777; }
.btn-book {
  flex: 1; border: none; background: var(--violet); color: #fff; border-radius: 14px;
  font-weight: 800; font-size: 0.95rem; cursor: pointer; transition: background 0.2s;
}
.btn-book:hover { background: #6d28d9; }

/* --- 모달 탭 (상세 / 관람평 / 동행) --- */
.modal-tabs { display: flex; margin: 4px 0 4px; border-bottom: 1px solid #f0edfa; }
.mtab {
  flex: 1; border: none; background: none; padding: 12px 4px; font-size: .85rem;
  font-weight: 700; color: var(--gray); cursor: pointer; position: relative;
}
.mtab.active { color: var(--violet); }
.mtab.active::after { content: ""; position: absolute; left: 20%; right: 20%; bottom: -1px; height: 3px; background: var(--violet); border-radius: 3px 3px 0 0; }
.mtab .n { font-size: .5rem; background: var(--pink); color: #fff; font-weight: 800; padding: 1px 5px; border-radius: 999px; margin-left: 3px; vertical-align: top; }

.review-item { display: flex; gap: 10px; padding: 13px 0; border-bottom: 1px solid #f0edfa; }
.review-item .av { width: 36px; height: 36px; border-radius: 50%; background: var(--violet-light); display: flex; align-items: center; justify-content: center; font-size: 1.05rem; flex-shrink: 0; }
.review-item .who { font-weight: 700; font-size: .84rem; }
.review-item .stars { color: #f59e0b; font-size: .72rem; }
.review-item .txt { font-size: .83rem; color: #4b4560; margin-top: 3px; }

/* 매칭 온도바 */
.temp-card { background: var(--bg); border-radius: 16px; padding: 16px; }
.temp-head { display: flex; align-items: center; justify-content: space-between; font-weight: 800; font-size: .92rem; }
.temp-track { height: 13px; border-radius: 999px; background: #eae4f6; margin-top: 12px; overflow: hidden; }
.temp-fill { height: 100%; width: 0; border-radius: 999px; background: linear-gradient(90deg,#38bdf8,#a855f7,#f472b6,#fb7185); transition: width 1s cubic-bezier(.3,1,.4,1); }
.temp-scale { display: flex; justify-content: space-between; font-size: .66rem; color: var(--gray); margin-top: 6px; }
.temp-note { font-size: .82rem; color: var(--violet); font-weight: 700; margin-top: 11px; text-align: center; }

.mate-sub-title { font-weight: 800; font-size: .88rem; margin: 18px 0 10px; }
.mini-post { background: #fff; border: 1.5px solid #f0edfa; border-radius: 12px; padding: 12px 13px; margin-bottom: 9px; cursor: pointer; }
.mini-post:hover { border-color: var(--violet-light); }
.mini-post .t { font-weight: 700; font-size: .85rem; }
.mini-post .m { font-size: .74rem; color: var(--gray); margin-top: 5px; display: flex; gap: 8px; flex-wrap: wrap; }
.cta-recruit {
  width: 100%; margin-top: 6px; border: none; border-radius: 14px; padding: 14px;
  font-size: .92rem; font-weight: 800; color: #fff; cursor: pointer;
  background: linear-gradient(120deg, var(--violet), var(--pink)); box-shadow: 0 6px 18px rgba(124,58,237,.3);
}

/* ---------- 동행 플로우 (작성 / 프로필 / 채팅) ---------- */
.flow-overlay { position: fixed; inset: 0; background: rgba(30,27,46,.55); display: flex; align-items: center; justify-content: center; z-index: 110; padding: 20px; }
.flow-modal { background: #fff; border-radius: 24px; max-width: 480px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; position: relative; animation: slide-up .25s ease-out; overflow: hidden; }
.flow-head { display: flex; align-items: center; gap: 10px; padding: 18px 20px; border-bottom: 1px solid #f0edfa; flex-shrink: 0; }
.flow-back { width: 32px; height: 32px; border: none; background: var(--violet-light); color: var(--violet); border-radius: 50%; font-size: 1rem; cursor: pointer; }
.flow-head h3 { font-size: 1rem; font-weight: 800; flex: 1; }
.flow-close { width: 32px; height: 32px; border: none; background: #f3f0fa; border-radius: 50%; cursor: pointer; font-size: .85rem; color: var(--gray); }
.flow-body { padding: 20px; overflow-y: auto; }

/* 작성 폼 */
.field { margin-bottom: 20px; }
.field > label { display: block; font-weight: 800; font-size: .86rem; margin-bottom: 8px; }
.field .req { color: var(--pink); font-size: .7rem; margin-left: 3px; }
.field .opt { color: var(--gray); font-size: .7rem; font-weight: 600; margin-left: 4px; }
.select { width: 100%; border: 1.5px solid #eee9fb; background: #fff; border-radius: 12px; padding: 12px 14px; font-size: .86rem; font-family: inherit; color: var(--ink); }
.two-col { display: flex; gap: 10px; } .two-col .select { flex: 1; }
.stepper { display: flex; align-items: center; gap: 14px; }
.stepper button { width: 42px; height: 42px; border: none; border-radius: 12px; background: var(--violet-light); color: var(--violet); font-size: 1.3rem; font-weight: 700; cursor: pointer; }
.stepper .val { font-size: 1.25rem; font-weight: 800; min-width: 36px; text-align: center; }
.stepper .unit { font-size: .82rem; color: var(--gray); }
.toggle-grp { display: flex; gap: 8px; }
.toggle { flex: 1; border: 1.5px solid #eee9fb; background: #fff; border-radius: 12px; padding: 11px 4px; font-size: .82rem; font-weight: 700; color: var(--gray); cursor: pointer; transition: .15s; }
.toggle.on { border-color: var(--violet); background: var(--violet-light); color: var(--violet); }
.radio-grp { display: flex; flex-direction: column; gap: 9px; }
.radio { display: flex; align-items: center; gap: 11px; border: 1.5px solid #eee9fb; background: #fff; border-radius: 12px; padding: 12px 14px; cursor: pointer; font-size: .86rem; font-weight: 600; transition: .15s; }
.radio .dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #d6cef0; flex-shrink: 0; }
.radio.on { border-color: var(--violet); background: var(--violet-light); }
.radio.on .dot { border-color: var(--violet); background: var(--violet); box-shadow: inset 0 0 0 3px #fff; }
.flow-body textarea { width: 100%; min-height: 100px; border: 1.5px solid #eee9fb; background: #fff; border-radius: 12px; padding: 13px; font-size: .86rem; font-family: inherit; resize: vertical; color: var(--ink); }
.flow-body textarea::placeholder { color: #b8b2c8; }
.flow-foot { padding: 12px 20px 18px; border-top: 1px solid #f0edfa; flex-shrink: 0; }
.flow-submit { width: 100%; border: none; border-radius: 14px; padding: 15px; font-size: .95rem; font-weight: 800; color: #fff; cursor: pointer; background: linear-gradient(120deg, var(--violet), var(--pink)); box-shadow: 0 6px 18px rgba(124,58,237,.3); }
.flow-submit:disabled { background: #d9d2ec; box-shadow: none; cursor: not-allowed; }

/* 프로필 */
.pf-post { background: var(--bg); border-radius: 16px; padding: 16px; }
.pf-post h2 { font-size: 1.05rem; font-weight: 800; line-height: 1.45; margin: 10px 0; }
.pf-meta { display: flex; flex-wrap: wrap; gap: 6px; }
.pf-meta .m { background: #fff; color: var(--violet); font-size: .72rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; box-shadow: inset 0 0 0 1.5px #e9e4f8; }
.pf-body-txt { font-size: .87rem; color: #4b4560; margin-top: 12px; white-space: pre-line; }
.pf-card { border: 1.5px solid #f3f0fc; border-radius: 16px; padding: 16px; margin-top: 14px; }
.pf-headrow { display: flex; align-items: center; gap: 12px; }
.pf-av { width: 50px; height: 50px; border-radius: 50%; background: var(--pink-soft); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
.pf-nick { font-weight: 800; font-size: 1rem; }
.pf-mmeta { font-size: .74rem; color: var(--gray); margin-top: 2px; }
.pf-sub { font-weight: 800; font-size: .78rem; color: var(--gray); margin: 15px 0 8px; }
.kw-row { display: flex; flex-wrap: wrap; gap: 6px; }
.kw { background: var(--violet-light); color: var(--violet); font-size: .73rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
.pf-intro { margin-top: 13px; background: var(--bg); border-radius: 12px; padding: 13px; font-size: .86rem; color: #4b4560; font-style: italic; }

/* 바텀시트 (인사말) */
.sheet-dim { position: absolute; inset: 0; background: rgba(30,27,46,.5); z-index: 5; opacity: 0; pointer-events: none; transition: opacity .25s; }
.sheet-dim.show { opacity: 1; pointer-events: auto; }
.sheet { position: absolute; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 24px 24px 0 0; padding: 20px 20px 22px; z-index: 6; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); }
.sheet.show { transform: translateY(0); }
.sheet .grab { width: 40px; height: 4px; background: #e2dcf0; border-radius: 999px; margin: 0 auto 14px; }
.sheet h4 { font-size: 1.02rem; font-weight: 800; }
.sheet p { font-size: .8rem; color: var(--gray); margin-top: 5px; }
.sheet .quicks { display: flex; flex-wrap: wrap; gap: 7px; margin: 13px 0; }
.sheet .quicks button { border: 1.5px solid #eee9fb; background: #fff; border-radius: 999px; padding: 7px 12px; font-size: .78rem; font-weight: 600; cursor: pointer; color: #4b4560; }
.sheet textarea { width: 100%; min-height: 68px; border: 1.5px solid #eee9fb; border-radius: 12px; padding: 12px; font-size: .86rem; font-family: inherit; resize: none; }
.sheet .send { width: 100%; border: none; border-radius: 14px; padding: 14px; font-size: .92rem; font-weight: 800; color: #fff; margin-top: 12px; cursor: pointer; background: linear-gradient(120deg, var(--violet), var(--pink)); }

/* 채팅 */
.chat-topchip { margin: 0 20px 12px; background: var(--bg); border: 1px solid #f0edfa; border-radius: 12px; padding: 9px 12px; display: flex; align-items: center; gap: 8px; font-size: .78rem; font-weight: 700; color: var(--violet); cursor: pointer; }
.chat-topchip .go { margin-left: auto; color: var(--gray); }
.confirm-btn { border: none; border-radius: 999px; padding: 8px 13px; font-size: .74rem; font-weight: 800; cursor: pointer; background: var(--violet-light); color: var(--violet); }
.confirm-btn.done { background: var(--ok); color: #fff; }
.chat-scroll { flex: 1; overflow-y: auto; padding: 8px 16px 12px; display: flex; flex-direction: column; gap: 9px; background: var(--bg); min-height: 300px; }
.sys { align-self: center; max-width: 90%; text-align: center; background: #efe9fb; color: #7a6fa3; font-size: .72rem; font-weight: 600; padding: 9px 14px; border-radius: 12px; line-height: 1.45; }
.sys.confirm { background: #e7f9f0; color: #0d9d68; font-weight: 800; }
.msg { max-width: 74%; padding: 10px 13px; border-radius: 16px; font-size: .85rem; line-height: 1.45; }
.msg.them { align-self: flex-start; background: #fff; border-bottom-left-radius: 5px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.msg.me { align-self: flex-end; background: var(--violet); color: #fff; border-bottom-right-radius: 5px; }

const SEEK = { 1:15, 3:42, 5:6, 6:11, 7:9, 9:15, 12:33 };
function seekCount(showId){
  const base = SEEK[showId] || 0;
  const open = MATEPOSTS.filter(p=>p.showId===showId && p.status==='open').length;
  return Math.max(base, open);
}

/* ---------- 공통 헬퍼 ---------- */
function tclassOf(t){ return t>=70 ? 't-hot' : t>=55 ? 't-warm' : 't-cool'; }
function parseWhen(w){ const m=w.match(/(\d+)월\s*(\d+)일/); return m ? {mo:+m[1], d:+m[2]} : {mo:0, d:0}; }
function verifiedBadge(on, lg){ return on ? `<span class="verified ${lg?'lg':''}">✅ 티켓인증</span>` : ''; }

/* 포스터풍 배경 (실제 저작권 포스터 대신 공연 색감 기반 디자인) */
function posterBg(p){
  return `radial-gradient(circle at 80% 12%, rgba(255,255,255,.28), transparent 42%),`
       + `radial-gradient(circle at 12% 90%, rgba(255,255,255,.14), transparent 40%),`
       + `linear-gradient(150deg, ${p.colors[0]}, ${p.colors[1]})`;
}
function posterHTML(p, opts){
  opts = opts || {};
  const seek = opts.seek ? seekCount(p.id) : 0;
  return `
    <span class="poster-emoji ${opts.big?'big':''}">${p.emoji}</span>
    ${opts.big ? '' : verifiedInPoster(p)}
    <div class="poster-scrim">
      <span class="poster-kicker">${p.genre} · ${p.region}</span>
      <span class="poster-name ${opts.big?'lg':''}">${p.title}</span>
    </div>
    ${seek ? `<span class="seek-badge">🔥 ${seek}명이 동행 찾는 중</span>` : ''}`;
}
function verifiedInPoster(p){
  // 이 공연에 티켓 인증 모집글이 하나라도 있으면 포스터에 인증 표시
  const has = MATEPOSTS.some(m=>m.showId===p.id && m.verified);
  return has ? `<span class="verified poster-verified">✅ 인증</span>` : '';
}

/* ================= 찜 ================= */
function isFav(id){ return state.favs.includes(id); }
function toggleFav(id){
  const show = PERFORMANCES.find((p) => p.id === id);
  if (isFav(id)) { state.favs = state.favs.filter((x)=>x!==id); showToast(`'${show.title}' 찜을 해제했어요`); }
  else { state.favs.push(id); showToast(`'${show.title}' 찜 목록에 저장했어요 ❤️`); }
  localStorage.setItem(LS_KEY, JSON.stringify(state.favs));
  renderCards(); renderFavCount();
  if (!$('#mypage-overlay').classList.contains('hidden')) renderMyPage();
}
function renderFavCount(){
  const btn = $('#fav-toggle');
  btn.innerHTML = `${state.onlyFavs ? '❤️' : '🤍'} 찜 목록 <span id="fav-count">${state.favs.length}</span>`;
  btn.classList.toggle('active', state.onlyFavs);
}

/* ================= Toast ================= */
let toastTimer = null;
function showToast(msg){
  const toast = $('#toast');
  toast.textContent = msg; toast.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.add('hidden'), 2200);
}

/* ================= 장르 칩 ================= */
function renderChips(){
  $('#genre-chips').innerHTML = GENRES.map(
    (g)=>`<button class="chip ${state.genre===g?'active':''}" data-genre="${g}">${g}</button>`
  ).join('');
}

/* ================= 공연 카드 ================= */
function getFiltered(){
  const kw = state.keyword.trim().toLowerCase();
  return PERFORMANCES.filter((p)=>{
    if (state.onlyFavs && !isFav(p.id)) return false;
    if (state.genre !== '전체' && p.genre !== state.genre) return false;
    if (kw && !p.title.toLowerCase().includes(kw) && !p.venue.toLowerCase().includes(kw)) return false;
    return true;
  });
}
function renderCards(){
  const list = getFiltered();
  $('#empty-msg').classList.toggle('hidden', list.length>0);
  $('#card-grid').innerHTML = list.map((p)=>`
      <article class="card" data-id="${p.id}">
        <div class="poster" style="background:${posterBg(p)}">${posterHTML(p, {seek:true})}</div>
        <button class="heart-btn ${isFav(p.id)?'liked':''}" data-fav="${p.id}" aria-label="찜하기">${isFav(p.id)?'❤️':'🤍'}</button>
        <div class="card-body">
          <div class="card-tags"><span class="tag-genre">${p.genre}</span><span class="tag-region">📍 ${p.region}</span></div>
          <p class="card-meta">${p.venue}<br>🗓️ ${p.date}</p>
        </div>
      </article>`).join('');
}

let confirmDone=false, replyTimer=null;
function openChat(postId, firstMsg){
  const m = MATEPOSTS.find(x=>x.id===postId); if(!m) return;

      <div class="sys">안전한 관람을 위해 서로 배려하는 대화를 나눠주세요. 무리한 개인정보 요구에 유의하시기 바랍니다.</div>
    </div>
    <div class="chat-input">
      <button class="pin-btn" onclick="dropPin()" title="만날 장소 핀 찍기">📍</button>
      <input id="chat-text" placeholder="메시지를 입력하세요" onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="chat-send" onclick="sendMsg()">↑</button>

  openFlow();
  if (firstMsg) setTimeout(()=>{ addMsg(firstMsg,'me'); replyLater(); }, 300);

function addMsg(text,who){ const d=document.createElement('div'); d.className='msg '+who; d.textContent=text; $('#chat-scroll').appendChild(d); scrollChat(); }
function scrollChat(){ const s=$('#chat-scroll'); s.scrollTop=s.scrollHeight; }
function sendMsg(){ const inp=$('#chat-text'); const v=inp.value.trim(); if(!v)return; addMsg(v,'me'); inp.value=''; replyLater(); }
function replyLater(){
  clearTimeout(replyTimer);
  replyTimer=setTimeout(()=>{
    const r=['좋아요! 그 시간 괜찮습니다 😊','네 저도 그렇게 관람하는 편이에요~','만날 장소는 공연장 로비 어떠세요?'];
    addMsg(r[Math.floor(Math.random()*r.length)],'them');
  },1100);
}
function dropPin(){
  const m = MATEPOSTS.find(x=>x.id===currentPostId);
  const show = PERFORMANCES.find(p=>p.id===m.showId);
  const d=document.createElement('div'); d.className='msg pin';
  d.innerHTML=`<div class="map">📍</div><div class="cap">${show.venue} 로비<span>공연 30분 전 · 지도 보기 ›</span></div>`;
  $('#chat-scroll').appendChild(d); scrollChat();
  showToast('만날 장소를 공유했어요 📍');
}
function confirmMate(){
  const btn=$('#confirm-btn'); if(confirmDone)return;
  btn.textContent='내가 확정함 ✓';
  const s=document.createElement('div'); s.className='sys'; s.textContent='나 님이 동행을 확정했어요. 상대의 확정을 기다리는 중…';
  $('#chat-scroll').appendChild(s); scrollChat();
  setTimeout(()=>{ addMsg('저도 좋아요, 확정할게요!','them');
    setTimeout(()=>{
      confirmDone=true; btn.textContent='동행 확정 완료'; btn.classList.add('done');
      const c=document.createElement('div'); c.className='sys confirm'; c.textContent='🎉 동행이 확정되었어요! 마이페이지 캘린더에 일정이 추가됩니다.';

      renderMateBoard(); renderCards();
    },900);
  },1000);
}

/* ================= 예매 페이지 ================= */
let BK = { showId:null, qty:1, grade:0 };
function gradesOf(p){
  // price 문자열에서 등급/금액 파싱 (간단 파서)
  const parts = p.price.split('/').map(s=>s.trim());
  const out = [];
  parts.forEach(part=>{
    const mm = part.match(/([A-Za-z가-힣0-9]+)\s*([\d,]+)\s*원/);
    if (mm) out.push({ name: mm[1], price: +mm[2].replace(/,/g,'') });
  });
  return out.length ? out : [{ name:'일반', price: 50000 }];
}
function openBooking(showId){
  const p = PERFORMANCES.find(x=>x.id===Number(showId)); if(!p) return;
  BK = { showId:p.id, qty:1, grade:0 };

}
function renderBooking(){
  const p = PERFORMANCES.find(x=>x.id===BK.showId);

  const g = grades[BK.grade];
  const total = g.price * BK.qty;
  $('#book-inner').innerHTML = `
    <div class="book-poster" style="background:${posterBg(p)}">${posterHTML(p,{big:true})}</div>

      <div class="field" style="margin-top:16px"><label>좌석 등급</label>
        <select class="select" id="bk-grade" onchange="setGrade(this.value)">
          ${grades.map((x,i)=>`<option value="${i}" ${i===BK.grade?'selected':''}>${x.name} · ${x.price.toLocaleString()}원</option>`).join('')}
        </select></div>
      <div class="field"><label>매수</label>
        <div class="stepper"><button type="button" onclick="bkQty(-1)">−</button><span class="val">${BK.qty}</span><button type="button" onclick="bkQty(1)">＋</button><span class="unit">매</span></div></div>
      <div class="book-total"><span>결제 금액</span><span class="amt">${total.toLocaleString()}원</span></div>

function bkQty(d){ BK.qty=Math.min(4,Math.max(1,BK.qty+d)); renderBooking(); }

function myEvents(){
  const ev=[];
  MYSCHEDULE.forEach(s=>{ const d=parseWhen(s.when); ev.push({type:'confirm', mo:d.mo, d:d.d, ...s}); });
  MATEPOSTS.filter(p=>p.nick==='나').forEach(p=>{ const d=parseWhen(p.when); ev.push({type:'mine', mo:d.mo, d:d.d, postId:p.id, showId:p.showId, title:p.title, when:p.when}); });
  return ev;
}

function renderMyPage(){
  const myPosts = MATEPOSTS.filter(p=>p.nick==='나');
  $('#mypage-inner').innerHTML = `
    <div class="mp-head">
      <button class="mp-close" onclick="closeMyPage()">✕</button>
      <div class="mp-me">
        <span class="av">🙋</span>
        <div>
          <p class="nick">나 <span class="verified">✅ 티켓인증 ${Object.values(userVerified).filter(Boolean).length}건</span></p>
          <p class="meta">🌡 내 매너온도 ${myTemp.toFixed(1)}° · 찜 ${state.favs.length} · 확정 동행 ${MYSCHEDULE.length}</p>
        </div>
      </div>
    </div>
    <div class="mp-tabs">
      <button class="mp-tab ${mpTab==='calendar'?'active':''}" onclick="setMpTab('calendar')">📅 캘린더</button>
      <button class="mp-tab ${mpTab==='schedule'?'active':''}" onclick="setMpTab('schedule')">🤝 예정 동행</button>
      <button class="mp-tab ${mpTab==='favs'?'active':''}" onclick="setMpTab('favs')">❤️ 찜</button>
      <button class="mp-tab ${mpTab==='posts'?'active':''}" onclick="setMpTab('posts')">📝 내 글</button>
    </div>
    <div class="mp-body" id="mp-body"></div>`;
  if (mpTab==='calendar') renderCalendar();
  else if (mpTab==='schedule') renderSchedule();
  else if (mpTab==='favs') renderFavsTab();
  else renderMyPosts(myPosts);
}

function renderCalendar(){
  const ev = myEvents().filter(e=>e.mo===calYM.m);
  const dayHas = {};
  ev.forEach(e=>{ (dayHas[e.d]=dayHas[e.d]||{}); dayHas[e.d][e.type]=true; });
  const first = new Date(calYM.y, calYM.m-1, 1).getDay();
  const days = new Date(calYM.y, calYM.m, 0).getDate();
  const dows=['일','월','화','수','목','금','토'];
  let cells = dows.map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) cells += `<div class="day muted"></div>`;
  for(let d=1; d<=days; d++){
    const has = dayHas[d];
    const dots = has ? `<span class="cal-dots">${has.confirm?'<i class="dot-confirm"></i>':''}${has.mine?'<i class="dot-mine"></i>':''}</span>` : '';
    cells += `<div class="day ${has?'has':''} ${calSel===d?'sel':''}" ${has?`onclick="selCalDay(${d})"`:''}>${d}${dots}</div>`;
  }
  let detail = '';
  if (calSel){
    const list = ev.filter(e=>e.d===calSel);
    detail = `<div class="cal-day-events"><h5>${calYM.m}월 ${calSel}일 일정</h5>${list.map(e=>{
      const show = PERFORMANCES.find(p=>p.id===e.showId);
      return e.type==='confirm'
        ? `<div class="mp-item" onclick="openModal(${e.showId},'info');closeMyPage()"><div class="thumb" style="background:${posterBg(show)}">${show.emoji}</div><div class="info"><p class="t">${e.av} ${e.nick} 님과 동행 확정</p><p class="s">${show.title} · ${e.when}</p></div><span class="mp-badge-done">확정</span></div>`
        : `<div class="mp-item" onclick="openProfile(${e.postId});closeMyPage()"><div class="thumb" style="background:${posterBg(show)}">${show.emoji}</div><div class="info"><p class="t">${e.title}</p><p class="s">${show.title} · ${e.when}</p></div><span class="mp-badge-open">내 글</span></div>`;
    }).join('')}</div>`;
  }
  $('#mp-body').innerHTML = `
    <div class="cal-wrap">
      <div class="cal-nav">
        <button onclick="calMove(-1)">‹</button>
        <h4>${calYM.y}년 ${calYM.m}월</h4>
        <button onclick="calMove(1)">›</button>
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-legend"><span><i class="dot-confirm"></i> 확정 동행</span><span><i class="dot-mine"></i> 내가 쓴 글</span></div>
    </div>
    ${detail}`;
}
function calMove(d){ let m=calYM.m+d, y=calYM.y; if(m<1){m=12;y--;} if(m>12){m=1;y++;} calYM={y,m}; calSel=null; renderCalendar(); }
function selCalDay(d){ calSel = (calSel===d?null:d); renderCalendar(); }

function renderSchedule(){
  if (!MYSCHEDULE.length){ $('#mp-body').innerHTML = `<p class="mp-empty">아직 확정된 동행이 없어요.<br>동행 채팅에서 ‘동행 확정하기’를 누르면 여기에 표시돼요 🤝</p>`; return; }
  $('#mp-body').innerHTML = MYSCHEDULE.map(s=>{
    const show = PERFORMANCES.find(p=>p.id===s.showId);
    return `<div class="mp-item">
      <div class="thumb" style="background:${posterBg(show)}">${show.emoji}</div>
      <div class="info" onclick="openModal(${s.showId},'info');closeMyPage()">
        <p class="t">${s.av} ${s.nick} 님과 동행</p>
        <p class="s">${show.title} · 🗓 ${s.when}</p>
      </div>
      ${s.rated ? `<span class="mp-badge-done">평가완료</span>` : `<button class="mp-rate-btn" onclick="openRate(${s.postId})">매너 평가</button>`}
    </div>`;
  }).join('');
}

function renderFavsTab(){
  const favs = PERFORMANCES.filter(p=>state.favs.includes(p.id));
  if (!favs.length){ $('#mp-body').innerHTML = `<p class="mp-empty">찜한 공연이 없어요.<br>공연 카드의 🤍 버튼을 눌러 담아보세요!</p>`; return; }
  $('#mp-body').innerHTML = favs.map(p=>`
    <div class="mp-item" onclick="openModal(${p.id},'info');closeMyPage()">
      <div class="thumb" style="background:${posterBg(p)}">${p.emoji}</div>
      <div class="info"><p class="t">${p.title}</p><p class="s">${p.venue} · 🗓 ${p.date}</p></div>
      <span class="go">보기 ›</span>
    </div>`).join('');
}

function renderMyPosts(myPosts){
  if (!myPosts.length){ $('#mp-body').innerHTML = `<p class="mp-empty">작성한 모집글이 없어요.<br>‘＋ 동행 모집하기’로 첫 글을 남겨보세요 📝</p>`; return; }
  $('#mp-body').innerHTML = myPosts.map(m=>{
    const show = PERFORMANCES.find(p=>p.id===m.showId);
    return `<div class="mp-item" onclick="openProfile(${m.id});closeMyPage()">
      <div class="thumb" style="background:${posterBg(show)}">${show.emoji}</div>
      <div class="info"><p class="t">${m.title}</p><p class="s">${show.title} · 👥 ${m.cur}/${m.max} · 🗓 ${m.when}</p></div>
      <span class="${m.status==='open'?'mp-badge-open':'mp-badge-done'}">${m.status==='open'?'모집중':'마감'}</span>
    </div>`;
  }).join('');
}

/* ================= 플로우 오버레이 공통 ================= */
function openFlow(){ $('#flow-overlay').classList.remove('hidden'); document.body.style.overflow='hidden'; }
function closeFlow(){ $('#flow-overlay').classList.add('hidden'); closeSheet(); document.body.style.overflow=''; }

/* ================= 이벤트 ================= */
function bindEvents(){
  $('#search-input').addEventListener('input',(e)=>{ state.keyword=e.target.value; renderCards(); });

  $('#genre-chips').addEventListener('click',(e)=>{ const c=e.target.closest('[data-genre]'); if(!c)return;
    state.genre=c.dataset.genre; renderChips(); renderCards(); });

  $('#card-grid').addEventListener('click',(e)=>{
    const heart=e.target.closest('[data-fav]'); if(heart){ toggleFav(Number(heart.dataset.fav)); return; }
    const card=e.target.closest('.card'); if(card) openModal(card.dataset.id,'info');
  });

  $('#fav-toggle').addEventListener('click',()=>{ state.onlyFavs=!state.onlyFavs; renderFavCount(); renderCards();
    showToast(state.onlyFavs?'찜한 공연만 보여드릴게요 💜':'전체 공연을 보여드릴게요'); });

  $('#modal-body').addEventListener('click',(e)=>{
    const tab=e.target.closest('[data-tab]'); if(tab){ openModal(tab.dataset.id, tab.dataset.tab); return; }
    const heart=e.target.closest('[data-fav]'); if(heart){ const id=Number(heart.dataset.fav); toggleFav(id); openModal(id, modalTab); return; }
    const book=e.target.closest('[data-book]'); if(book){ closeModal(); openBooking(book.dataset.book); return; }
    const post=e.target.closest('[data-post]'); if(post){ closeModal(); openProfile(Number(post.dataset.post)); return; }
    const rec=e.target.closest('[data-recruit]'); if(rec){ closeModal(); openWrite(Number(rec.dataset.recruit)); return; }
  });

  $('#modal-close').addEventListener('click',closeModal);
  $('#modal-overlay').addEventListener('click',(e)=>{ if(e.target===$('#modal-overlay')) closeModal(); });
  document.addEventListener('keydown',(e)=>{ if(e.key==='Escape'){ closeModal(); closeFlow(); closeBook(); closeRate(); closeMyPage(); } });

  $('#mate-filters').addEventListener('click',(e)=>{ const c=e.target.closest('[data-matechip]'); if(!c)return;
    mateFilter=c.dataset.matechip; renderMateChips(); renderMateBoard(); });
  $('#mate-list').addEventListener('click',(e)=>{ const card=e.target.closest('[data-post]'); if(card) openProfile(Number(card.dataset.post)); });

  $('#greet-quicks').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return; $('#greet-text').value=b.textContent; });

  $('#flow-overlay').addEventListener('click',(e)=>{ if(e.target===$('#flow-overlay')) closeFlow(); });
  $('#book-overlay').addEventListener('click',(e)=>{ if(e.target===$('#book-overlay')) closeBook(); });
  $('#rate-overlay').addEventListener('click',(e)=>{ if(e.target===$('#rate-overlay')) closeRate(); });
  $('#mypage-overlay').addEventListener('click',(e)=>{ if(e.target===$('#mypage-overlay')) closeMyPage(); });
}

/* ================= 초기화 ================= */
renderChips();
renderCards();
renderMateChips();
renderMateBoard();
renderFavCount();
bindEvents();

  </script>
</body>
</html>
